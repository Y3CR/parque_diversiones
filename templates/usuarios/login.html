{% extends 'base/base.html' %}
{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 4rem auto;">
    <div class="card" style="text-align: center;">
        <div style="font-size: 3rem; margin-bottom: 0.5rem;">🎡</div>
        <h2 style="margin-bottom: 0.3rem; color: #1a237e;">Parque de Diversiones</h2>
        <p style="color: #888; font-size: 0.85rem; margin-bottom: 1.5rem;">Panel de gestión interna</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group" style="text-align: left;">
                <label>Usuario</label>
                <input type="text" name="username" autofocus required placeholder="Nombre de usuario">
            </div>
            <div class="form-group" style="text-align: left;">
                <label>Contraseña</label>
                <input type="password" name="password" required placeholder="Contraseña">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">
                Ingresar
            </button>
        </form>
    </div>
</div>
{% endblock %}
