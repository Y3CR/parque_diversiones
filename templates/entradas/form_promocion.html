{% extends 'base/base.html' %}
{% block title %}{% if object %}Editar{% else %}Nueva{% endif %} promoción{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{% if object %}✏️ Editar promoción{% else %}🏷️ Nueva promoción{% endif %}</h1>
    <a href="{% url 'entradas:promociones' %}" class="btn btn-secondary">← Volver</a>
</div>
<div class="card" style="max-width:520px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Nombre *</label>
            <input type="text" name="nombre" value="{{ object.nombre|default:'' }}" required>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label>Tipo de entrada *</label>
                <select name="tipo_entrada" required>
                    {% for t in tipos %}
                        <option value="{{ t.pk }}"
                            {% if object.tipo_entrada_id == t.pk %}selected{% endif %}>
                            {{ t.nombre }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Canal *</label>
                <select name="canal">
                    <option value="web" {% if object.canal == 'web' %}selected{% endif %}>Web</option>
                    <option value="taquilla" {% if object.canal == 'taquilla' or not object %}selected{% endif %}>Taquilla</option>
                </select>
            </div>
            <div class="form-group">
                <label>Descuento (%) *</label>
                <input type="number" name="descuento_porcentaje" step="0.01" min="0" max="100"
                       value="{{ object.descuento_porcentaje|default:'' }}" required>
            </div>
            <div class="form-group" style="display:flex; align-items:flex-end;">
                <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; margin-bottom:0;">
                    <input type="checkbox" name="activa"
                           {% if object.activa or not object %}checked{% endif %}
                           style="width:auto;">
                    Promoción activa
                </label>
            </div>
            <div class="form-group">
                <label>Vigencia desde *</label>
                <input type="date" name="vigencia_desde"
                       value="{{ object.vigencia_desde|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Vigencia hasta *</label>
                <input type="date" name="vigencia_hasta"
                       value="{{ object.vigencia_hasta|default:'' }}" required>
            </div>
        </div>
        <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
            <button type="submit" class="btn btn-primary">
                {% if object %}Guardar cambios{% else %}Crear promoción{% endif %}
            </button>
            <a href="{% url 'entradas:promociones' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
