{% extends 'base/base.html' %}
{% block title %}{% if object %}Editar{% else %}Nuevo{% endif %} tipo{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{% if object %}✏️ Editar tipo{% else %}➕ Nuevo tipo de entrada{% endif %}</h1>
    <a href="{% url 'entradas:tipos' %}" class="btn btn-secondary">← Volver</a>
</div>
<div class="card" style="max-width:480px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Nombre *</label>
            <input type="text" name="nombre" value="{{ object.nombre|default:'' }}"
                   required placeholder="Ej: General, Infantil, Adulto mayor">
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea name="descripcion" rows="2">{{ object.descripcion|default:'' }}</textarea>
        </div>
        <div class="form-group">
            <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                <input type="checkbox" name="activo"
                       {% if object.activo or not object %}checked{% endif %}
                       style="width:auto;">
                Tipo activo
            </label>
        </div>
        <div style="display:flex; gap:0.75rem;">
            <button type="submit" class="btn btn-primary">
                {% if object %}Guardar cambios{% else %}Crear tipo{% endif %}
            </button>
            <a href="{% url 'entradas:tipos' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
