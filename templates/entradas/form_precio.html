{% extends 'base/base.html' %}
{% block title %}Nuevo precio{% endblock %}
{% block content %}
<div class="page-header">
    <h1>💰 Nuevo precio</h1>
    <a href="{% url 'entradas:precios' %}" class="btn btn-secondary">← Volver</a>
</div>
<div class="card" style="max-width:520px;">
    <div class="alert alert-info" style="margin-bottom:1rem;">
        Al crear un nuevo precio, el valor anterior queda guardado automáticamente en el historial.
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Tipo de entrada *</label>
            <select name="tipo_entrada" required>
                <option value="">Selecciona un tipo</option>
                {% for t in tipos %}
                    <option value="{{ t.pk }}">{{ t.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label>Canal *</label>
                <select name="canal">
                    <option value="web">Web</option>
                    <option value="taquilla">Taquilla</option>
                </select>
            </div>
            <div class="form-group">
                <label>Valor *</label>
                <input type="number" name="valor" step="0.01" min="0" required
                       placeholder="Ej: 25000">
            </div>
            <div class="form-group">
                <label>Vigencia desde *</label>
                <input type="date" name="vigencia_desde" required>
            </div>
            <div class="form-group">
                <label>Vigencia hasta</label>
                <input type="date" name="vigencia_hasta">
            </div>
        </div>
        <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
            <button type="submit" class="btn btn-primary">Guardar precio</button>
            <a href="{% url 'entradas:precios' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
