{% extends 'base/base.html' %}
{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>🍔 Reporte de Comida</h3>
    <div>
      <a href="{% url 'reportes:export_comida' %}" class="btn btn-outline-secondary btn-sm">📥 Exportar CSV</a>
      <a href="{% url 'reportes:dashboard' %}" class="btn btn-outline-primary btn-sm">← Dashboard</a>
    </div>
  </div>
  <table class="table table-bordered">
    <thead class="table-dark">
      <tr><th>Combo</th><th>Cantidad vendida</th><th>Ingresos</th></tr>
    </thead>
    <tbody>
      {% for item in items %}
      <tr>
        <td>{{ item.combo__nombre }}</td>
        <td>{{ item.total_vendidos }}</td>
        <td>${{ item.total_ingresos }}</td>
      </tr>
      {% empty %}
      <tr><td colspan="3" class="text-muted text-center">Sin pedidos registrados.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
