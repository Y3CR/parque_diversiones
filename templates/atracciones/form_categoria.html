{% extends 'base/base.html' %}
{% block title %}{% if object %}Editar{% else %}Nueva{% endif %} categoría{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{% if object %}✏️ Editar categoría{% else %}➕ Nueva categoría{% endif %}</h1>
    <a href="{% url 'atracciones:categorias' %}" class="btn btn-secondary">← Volver</a>
</div>

<div class="card" style="max-width:480px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Nombre *</label>
            <input type="text" name="nombre"
                   value="{{ object.nombre|default:'' }}" required
                   placeholder="Ej: Extrema, Familiar, Infantil, Acuática">
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea name="descripcion" rows="3"
                      placeholder="Descripción opcional de la categoría">{{ object.descripcion|default:'' }}</textarea>
        </div>
        <div style="display:flex; gap:0.75rem;">
            <button type="submit" class="btn btn-primary">
                {% if object %}Guardar cambios{% else %}Crear categoría{% endif %}
            </button>
            <a href="{% url 'atracciones:categorias' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
