{% extends 'base/base.html' %}
{% block content %}
<div class="container mt-4" style="max-width:500px;">
  <h3>🛒 {{ combo.nombre }}</h3>
  <p class="text-muted">{{ combo.descripcion }}</p>
  <p class="fw-bold fs-4 text-success">${{ combo.precio }}</p>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Cantidad</label>
      <input type="number" name="cantidad" value="1" min="1" max="10" class="form-control">
    </div>
    <button type="submit" class="btn btn-warning w-100">✅ Confirmar pedido</button>
    <a href="{% url 'comida:catalogo' %}" class="btn btn-outline-secondary w-100 mt-2">← Cancelar</a>
  </form>
</div>
{% endblock %}
